<!-- make a student registration form where in top of the form left side will e logo then heading registration form 
 then there will ne labels on left and on right we need to fill the data 
 first name (Full Name)
 then Class dropdown having BBA BCA MBA LLB BBALLB
 section dropdown Morning, Afternoon 
 mobile no 
 save cleear exit in same line 
 only html needed for now 
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Registration Form</title>
<style>
    /* basic styling */
    body {
        font-family: Arial, sans-serif;
        background-color: #f2f2f2;
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 350px;
        margin: 0 auto;
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        justify-content: center;
    }

    form div {
        margin-bottom: 12px;
    }

    label {
        display: inline-block;
        width: 220px;
        font-weight: bold;
    }

    input[type="text"], select {
        width: calc(100% - 130px);
        padding: 6px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    button {
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    button[type="submit"] { background-color: #4CAF50; color: #fff; }
    button[type="reset"] { background-color: #f0ad4e; color: #fff; }
    button[type="button"] { background-color: #d9534f; color: #fff; }
</style>
</head>
<body>
    <!-- registration container; visible immediately when page loads -->
    <div id="formContainer" class="container" style="display:block;">
        <div style="display: flex; align-items: center; margin-bottom:20px; justify-content: center;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/500px-Google_%22G%22_logo.svg.png" alt="Logo" style="width: 100px; height: 100px; margin-right: 20px;">
            <h1 style="text-align: center;">Student Registration Form</h1>
        </div>
        <form>
            <div style="display: flex;">
                <label for="fullName">Name (Full Name):</label>
                <input required type="text" id="fullName" name="fullName">
            </div>
            <div style="display: flex;">
                <label for="class">Class:</label>
                <select required id="class" name="class">
                    <option value="NO">Select Class</option>
                    <option value="BBA">BBA</option>
                    <option value="BCA">BCA</option>
                    <option value="MBA">MBA</option>
                    <option value="LLB">LLB</option>
                    <option value="BBALLB">BBALLB</option>
                </select>
            </div>
            <div style="display: flex;">
                <label for="section">Section:</label>
                <select required id="section" name="section">
                    <option value="No">Select Section</option>
                    <option value="Morning">Morning</option>
                    <option value="AfternoonA">Afternoon A</option>
                    <option value="AfternoonB">Afternoon B</option>
                </select>
            </div>
            <div style="display: flex; margin-bottom: 20px; width: 100%;">
                <label for="mobileNo">Mobile No:</label>
                <input required type="tel" id="mobileNo" name="mobileNo">
            </div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button type="button" onclick="submitForm('POST', 'excercise4.1.php')">Save (POST)</button>
                <button type="button" onclick="submitForm('GET', 'excercise4.2.php')">Save (GET)</button>
                <button type="reset" onclick="alert('Form Cleared')">Clear</button>
                <button type="button" onclick="exitwindow()">Exit</button>
            </div>
        </form>
    </div>
    <script>
    // mobile number validation
    document.getElementById('mobileNo')?.addEventListener('input', function (e) {
        const value = e.target.value;
        // Allow only digits and limit to 10 characters
        e.target.value = value.replace(/\D/g, '').slice(0, 10);
    });

    // Function to submit form with GET or POST method
    function submitForm(method, action) {
        const form = document.querySelector('form');
        form.method = method;
        form.action = action;
        form.submit();
    }

    //client side java function to close the window when exit button is clicked
    function exitwindow() {
    const confirmExit = confirm("Are you sure you want to exit?");
    
    if (confirmExit) {
        document.getElementById("formContainer").style.display = "none";
        
        const message = document.createElement("h2");
        message.textContent = "Thank you for visiting!";
        message.style.textAlign = "center";
        message.style.marginTop = "50px";
        
        document.body.appendChild(message);
    }
}

    // no special onload behavior needed, form is already visible
    window.addEventListener('DOMContentLoaded', function () {
       document.getElementById('formContainer');
    });
    </script>
</body>
</html>
